---
name: Integration tests

on:
  push:
    branches:
      - main

jobs:
  integration-test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        run: go test -run "TestIntegration" -v ./integration_test.go
        working-directory: "tests/"